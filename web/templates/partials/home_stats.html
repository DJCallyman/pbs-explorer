<div class="stats">
  <div class="stat-card">Total Items: <span id="total-items">{{ total_items }}</span></div>
  <div class="stat-card">Latest Schedule: <span id="latest-schedule">{{ latest_schedule }}</span></div>
  <div class="stat-card">Last Sync: <span id="last-sync">{{ last_sync }}</span></div>
</div>
<script>
  document.body.addEventListener('htmx:afterSwap', (e) => {
    if (e.detail.target.id === 'home-stats') htmx.trigger(e.detail.target, 'load');
  });
</script>
