{% extends "base.html" %}

{% block content %}
<section class="search-page">
  <div class="page-hero">
    <div>
      <h2 class="page-title-strong">PBS SCHEDULE &amp; SERVICES AUSTRALIA DATA SEARCH</h2>
    </div>
  </div>

  <div class="saved-report-status-banner">
    <div>
      <div class="saved-report-status-eyebrow">Latest PBS Schedule Available</div>
      <div class="saved-report-status-month" id="pbs-schedule-latest">Loading...</div>
      <div class="saved-report-status-meta" id="pbs-schedule-meta">Checking saved status...</div>
    </div>
    <button type="button" class="btn btn-secondary" onclick="checkLatestPBSSchedule()">Check Latest PBS Schedule Available</button>
  </div>

  <form
    id="item-search-form"
    class="search-form search-form-compact"
    hx-get="/web/items"
    hx-target="#results"
    hx-swap="innerHTML"
    hx-indicator="#loading"
  >
    <label class="field">
      <span>Drug</span>
      <input type="text" name="drug_name" placeholder="Drug name" autocomplete="off" />
    </label>

    <label class="field">
      <span>Brand</span>
      <input type="text" name="brand_name" placeholder="Brand name" autocomplete="off" />
    </label>

    <label class="field">
      <span>Item Code Contains</span>
      <input type="text" name="pbs_code" placeholder="Item code" autocomplete="off" />
    </label>

    <label class="field">
      <span>History Scope</span>
      <select name="schedule_mode">
        <option value="all" selected>Current + historical</option>
        <option value="current">Current schedule only</option>
        <option value="historical">Historical schedules only</option>
      </select>
    </label>

    <label class="field">
      <span>Program</span>
      <select name="program_code">
        <option value="">All programs</option>
        {% for option in program_options %}
          <option value="{{ option.code }}">{{ option.code }} - {{ option.pbs_program }}</option>
        {% endfor %}
      </select>
    </label>

    <label class="field">
      <span>Benefit Type</span>
      <select name="benefit_type_code">
        <option value="">All benefit types</option>
        <option value="U">Unrestricted</option>
        <option value="R">Restricted</option>
        <option value="A">Authority Required</option>
        <option value="S">Streamlined</option>
      </select>
    </label>

    <label class="field field-wide">
      <span>Indication</span>
      <input type="text" name="indication" placeholder="e.g. melanoma, pain, heart failure" />
    </label>

    <div class="search-actions">
      <button type="submit" class="btn btn-primary">Search</button>
      <button type="reset" class="btn btn-secondary" data-clear-results="true">Clear</button>
    </div>
  </form>

  <div class="search-status-row">
    <div id="loading" class="htmx-indicator status-chip">Searching…</div>
    <div class="results-hint">Grouped results can be sorted, filtered, and expanded in place.</div>
  </div>

  <div id="results" class="results"></div>

  <div id="report-section" class="report-card" style="display: none;">
    <div id="report-selection-summary" class="report-selection-summary"></div>
    <div class="report-grid">
      <label class="field field-inline" for="medicare-start-date">
        <span>Stats start date</span>
        <input type="text" id="medicare-start-date" placeholder="MMM-YYYY" inputmode="text" autocomplete="off" />
      </label>
      <label class="field field-inline" for="medicare-end-date">
        <span>Stats end date</span>
        <input
          type="text"
          id="medicare-end-date"
          placeholder="MMM-YYYY"
          inputmode="text"
          autocomplete="off"
          data-initial-month="{{ medicare_end_date }}"
        />
      </label>
      <label class="field field-inline" for="report-var">
        <span>Report on</span>
        <select id="report-var">
          <option value="SERVICES" selected>Services</option>
          <option value="BENEFIT">Benefit</option>
        </select>
      </label>
      <label class="field field-inline" for="report-format">
        <span>Report format</span>
        <select id="report-format">
          <option value="1">1 - Scheme by state</option>
          <option value="2" selected>2 - Scheme + month by state</option>
          <option value="3">3 - Scheme + financial year by state</option>
          <option value="4">4 - Scheme + calendar year by state</option>
          <option value="5">5 - Patient category</option>
          <option value="6">6 - Month by patient category</option>
          <option value="7">7 - Financial year by patient category</option>
          <option value="8">8 - Calendar year by patient category</option>
        </select>
      </label>
    </div>
    <div class="report-actions">
      <button type="button" class="btn btn-primary" onclick="viewPBSReport()">View Medicare Statistics Report</button>
      <button type="button" class="btn btn-secondary" onclick="copyReportURL()">Copy Report URL</button>
      <button type="button" class="btn btn-primary" onclick="downloadExcel()">Download Excel</button>
    </div>
  </div>
</section>
{% endblock %}
