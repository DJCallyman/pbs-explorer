{% extends "base.html" %}

{% block content %}
<section>
  <h2>Search</h2>
  <form class="search-form" hx-get="/web/items" hx-target="#results" hx-swap="innerHTML" hx-indicator="#loading">
    <input type="text" name="drug_name" placeholder="Drug name" />
    <input type="text" name="brand_name" placeholder="Brand name" />
    <input type="text" name="pbs_code" placeholder="PBS code" />
    <select name="program_code">
      <option value="">All Programs</option>
      <option value="GE">General Schedule</option>
      <option value="RP">Repatriation</option>
    </select>
    <select name="benefit_type_code">
      <option value="">All Benefit Types</option>
      <option value="U">Unrestricted</option>
      <option value="R">Restricted</option>
      <option value="A">Authority Required</option>
      <option value="S">Streamlined</option>
    </select>
    <input type="text" name="indication" placeholder="Indication" />
    <input type="text" name="severity" placeholder="Severity" />
    <button type="submit">Search</button>
    <button type="reset">Clear</button>
  </form>
  <div id="loading" class="htmx-indicator">Searching...</div>
  <div id="results" class="results"></div>
  <div id="report-section" style="display: none; margin-top: 1rem;">
    <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.75rem;">
      <label for="medicare-end-date" style="font-weight: 500; white-space: nowrap;">Stats end date:</label>
      <input type="month" id="medicare-end-date" value="{{ medicare_end_date[:4] }}-{{ medicare_end_date[4:] }}" style="padding: 0.4rem 0.5rem; border: 1px solid #d1d5db; border-radius: 6px;" />
    </div>
    <button type="button" class="btn btn-primary" onclick="viewPBSReport()">
      View Medicare Statistics Report
    </button>
    <button type="button" class="btn btn-secondary" onclick="copyReportURL()" style="margin-left: 0.5rem;">
      Copy Report URL
    </button>
    <button type="button" class="btn btn-primary" onclick="downloadExcel()" style="margin-left: 0.5rem;">
      Download Excel
    </button>
  </div>
</section>

<script>
// Set max to current month so future months can't be selected
(function() {
  const now = new Date();
  const max = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  document.getElementById('medicare-end-date').setAttribute('max', max);
})();

function getMedicareEndDate() {
  const picker = document.getElementById('medicare-end-date');
  if (picker && picker.value) {
    return picker.value.replace('-', '');
  }
  return '{{ medicare_end_date }}';
}

function getPBSReportURL() {
  const pbsCodes = [];
  let firstListedDate = null;
  
  document.querySelectorAll('#results tbody tr').forEach(row => {
    const cells = row.querySelectorAll('td');
    if (cells.length >= 4) {
      const pbsCode = cells[2].textContent.trim();
      const listedDate = cells[3].textContent.trim();
      
      if (pbsCode) {
        pbsCodes.push(pbsCode);
      }
      if (!firstListedDate && listedDate) {
        firstListedDate = listedDate;
      }
    }
  });
  
  if (pbsCodes.length === 0) {
    alert('No results to generate report for');
    return null;
  }

  const uniqueCodes = [...new Set(pbsCodes)];
  
  let startDate = "202501";
  if (firstListedDate) {
    const parsed = new Date(firstListedDate);
    if (!isNaN(parsed)) {
      startDate = parsed.toISOString().slice(0, 7).replace('-', '');
    }
  }
  
  const endDate = getMedicareEndDate();
  
  const itemlst = "''" + ",'" + uniqueCodes.join("','") + "',''";
  const params = new URLSearchParams({
    pbs_codes: itemlst,
    start_date: startDate,
    end_date: endDate
  });
  
  return '/web/pbs-report?' + params.toString();
}

function getDirectReportURL() {
  const pbsCodes = [];
  let firstListedDate = null;
  
  document.querySelectorAll('#results tbody tr').forEach(row => {
    const cells = row.querySelectorAll('td');
    if (cells.length >= 4) {
      const pbsCode = cells[2].textContent.trim();
      const listedDate = cells[3].textContent.trim();
      
      if (pbsCode) {
        pbsCodes.push(pbsCode);
      }
      if (!firstListedDate && listedDate) {
        firstListedDate = listedDate;
      }
    }
  });
  
  if (pbsCodes.length === 0) {
    return null;
  }

  const uniqueCodes = [...new Set(pbsCodes)];
  
  let startDate = "202501";
  if (firstListedDate) {
    const parsed = new Date(firstListedDate);
    if (!isNaN(parsed)) {
      startDate = parsed.toISOString().slice(0, 7).replace('-', '');
    }
  }
  
  const baseURL = 'https://medicarestatistics.humanservices.gov.au/SASStoredProcess/guest';
  const program = 'SBIP://METASERVER/Shared Data/sasdata/prod/VEA0032/SAS.StoredProcess/statistics/pbs_item_standard_report';
  
  const itemlst = uniqueCodes.map(c => "'" + c.padStart(6, '0') + "'").join(",");
  const listParam = uniqueCodes.join(',');
  const encodedProgram = encodeURIComponent(program);
  const encodedItemlst = encodeURIComponent(itemlst);
  
  return baseURL + '?_PROGRAM=' + encodedProgram + '&itemlst=' + encodedItemlst + '&ITEMCNT=' + uniqueCodes.length + '&LIST=' + encodeURIComponent(listParam) + '&VAR=SERVICES&RPT_FMT=2&start_dt=' + startDate + '&end_dt=' + getMedicareEndDate();
}

function viewPBSReport() {
  const url = getDirectReportURL();
  if (!url) {
    alert('No results to generate report for');
    return;
  }
  // Open via a temporary <a rel="noreferrer"> to strip the Referer header.
  // The SAS server blocks requests with a Referer (CSRF protection),
  // so this makes it behave like pasting the URL into a new tab.
  const a = document.createElement('a');
  a.href = url;
  a.target = '_blank';
  a.rel = 'noreferrer noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function copyReportURL() {
  const url = getDirectReportURL();
  if (!url) {
    alert('No results to generate report for');
    return;
  }
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(() => {
        alert('URL copied! Paste it directly into a new browser tab.');
      }).catch(() => {
        prompt('Copy this URL:', url);
      });
    } else {
      prompt('Copy this URL:', url);
    }
  } catch (err) {
    prompt('Copy this URL:', url);
  }
}

function downloadExcel() {
  const pbsCodes = [];
  let firstListedDate = null;
  document.querySelectorAll('#results tbody tr').forEach(row => {
    const cells = row.querySelectorAll('td');
    if (cells.length >= 4) {
      const pbsCode = cells[2].textContent.trim();
      const listedDate = cells[3].textContent.trim();
      if (pbsCode) pbsCodes.push(pbsCode);
      if (!firstListedDate && listedDate) firstListedDate = listedDate;
    }
  });
  if (pbsCodes.length === 0) {
    alert('No results to generate report for');
    return;
  }
  const uniqueCodes = [...new Set(pbsCodes)];
  let startDate = '202501';
  if (firstListedDate) {
    const parsed = new Date(firstListedDate);
    if (!isNaN(parsed)) startDate = parsed.toISOString().slice(0, 7).replace('-', '');
  }
  const itemlst = "''" + ",'" + uniqueCodes.join("','") + "',''";
  const params = new URLSearchParams({
    pbs_codes: itemlst,
    start_date: startDate,
    end_date: getMedicareEndDate()
  });
  // Show a loading indicator on the button
  const btn = document.querySelector('[onclick="downloadExcel()"]');
  const origText = btn.textContent;
  btn.textContent = 'Downloading…';
  btn.disabled = true;

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 90 * 1000);

  fetch('/web/pbs-report-excel?' + params.toString(), { signal: controller.signal })
    .then(resp => {
      if (!resp.ok) return resp.json().then(e => { throw new Error(e.detail || 'Download failed'); });
      const cd = resp.headers.get('content-disposition') || '';
      const match = cd.match(/filename="?([^";\s]+)"?/);
      const filename = match ? match[1] : 'pbs_report.xls';
      return resp.blob().then(blob => ({ blob, filename }));
    })
    .then(({ blob, filename }) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    })
    .catch(err => {
      if (err.name === 'AbortError') {
        alert('Download timed out. Please try again — it should be faster the second time.');
      } else {
        alert('Download failed: ' + err.message);
      }
    })
    .finally(() => {
      clearTimeout(timeoutId);
      btn.textContent = origText;
      btn.disabled = false;
    });
}

document.body.addEventListener('htmx:afterSwap', function(e) {
  if (e.detail.target.id === 'results') {
    const reportSection = document.getElementById('report-section');
    const hasResults = document.querySelectorAll('#results tbody tr').length > 0;
    reportSection.style.display = hasResults ? 'block' : 'none';

    // Set the picker min to the earliest listing date from results
    if (hasResults) {
      let earliestDate = null;
      document.querySelectorAll('#results tbody tr').forEach(row => {
        const listedText = row.querySelectorAll('td')[3]?.textContent.trim();
        if (listedText) {
          const d = new Date(listedText);
          if (!isNaN(d) && (!earliestDate || d < earliestDate)) earliestDate = d;
        }
      });
      if (earliestDate) {
        const minVal = earliestDate.getFullYear() + '-' + String(earliestDate.getMonth() + 1).padStart(2, '0');
        document.getElementById('medicare-end-date').setAttribute('min', minVal);
      }
    }

    // Fire-and-forget warmup: hit SAS server now so the report is
    // cached by the time the user clicks "Download Excel".
    if (hasResults) {
      const pbsCodes = [];
      let firstListedDate = null;
      document.querySelectorAll('#results tbody tr').forEach(row => {
        const cells = row.querySelectorAll('td');
        if (cells.length >= 4) {
          const code = cells[2].textContent.trim();
          const dated = cells[3].textContent.trim();
          if (code) pbsCodes.push(code);
          if (!firstListedDate && dated) firstListedDate = dated;
        }
      });
      if (pbsCodes.length) {
        const uniqueCodes = [...new Set(pbsCodes)];
        let startDate = '202501';
        if (firstListedDate) {
          const p = new Date(firstListedDate);
          if (!isNaN(p)) startDate = p.toISOString().slice(0, 7).replace('-', '');
        }
        const itemlst = "''" + ",'"+ uniqueCodes.join("','") +"',''";
        const params = new URLSearchParams({
          pbs_codes: itemlst,
          start_date: startDate,
          end_date: getMedicareEndDate()
        });
        fetch('/web/pbs-report-warmup?' + params.toString(), { method: 'POST' }).catch(() => {});
      }
    }
  }
});
</script>
{% endblock %}
